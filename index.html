<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Digital Market & Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌙 CRU Digital Market</h1>
    </header>

    <div class="main-layout">
        <aside class="sidebar card">
            <h3>📢 ลงประกาศใหม่</h3>
            <input type="text" id="itemName" placeholder="ชื่อสินค้า/บริการ">
            <input type="number" id="itemPrice" placeholder="ราคา (บาท)">
            <select id="itemCategory">
                <option value="ทั่วไป">หมวดหมู่ทั้งหมด</option>
                <option value="วิทยาศาสตร์">คณะวิทยาศาสตร์</option>
                <option value="ศึกษาศาสตร์">คณะศึกษาศาสตร์</option>
                <option value="วิทยาการจัดการ">คณะวิทยาการจัดการ</option>
                <option value="มนุษยศาสตร์">คณะมนุษยศาสตร์</option>
            </select>
            <textarea id="itemDetail" placeholder="รายละเอียด..."></textarea>
            <button id="btnPost" class="btn-main">โพสต์ประกาศ</button>
        </aside>

        <main class="content">
            <div id="marketList" class="grid"></div>
        </main>

        <section id="chatSection" class="chat-window card" style="display:none;">
            <div class="chat-header">
                <span id="chatWith">แชท</span>
                <button onclick="closeChat()">X</button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="msgText" placeholder="พิมพ์ข้อความ...">
                <button id="btnSend">ส่ง</button>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
