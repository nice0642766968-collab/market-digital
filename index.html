<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Market - ระบบซื้อขายและหารค่าใช้จ่าย</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authSection" class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>CRU Digital Market</h2>
                <p>เข้าสู่ระบบด้วยอีเมลมหาวิทยาลัย</p>
            </div>
            <div class="auth-body">
                <input type="email" id="email" placeholder="Email (@chandra.ac.th)">
                <input type="password" id="password" placeholder="Password">
                <button id="btnLogin" class="btn-primary">เข้าสู่ระบบ</button>
                <button id="btnRegister" class="btn-outline">สมัครสมาชิก</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="app-container" style="display: none;">
        <nav class="navbar">
            <div class="nav-brand">🌙 CRU <span>Market</span></div>
            <div class="nav-actions">
                <button onclick="openModal()" class="btn-add">+ ลงประกาศ / ตั้งตี้หาร</button>
                <button id="btnLogout" class="btn-logout">ออกจากระบบ</button>
            </div>
        </nav>

        <div class="content-wrapper">
            <div class="filter-bar">
                <button class="filter-btn active" data-cat="all">ทั้งหมด</button>
                <button class="filter-btn" data-cat="วิทยาศาสตร์">วิทยาศาสตร์</button>
                <button class="filter-btn" data-cat="วิทยาการจัดการ">วิทยาการจัดการ</button>
                <button class="filter-btn" data-cat="มนุษยศาสตร์">มนุษยศาสตร์</button>
                <button class="filter-btn" data-cat="ศึกษาศาสตร์">ศึกษาศาสตร์</button>
            </div>

            <div id="productList" class="product-grid"></div>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>📢 ลงประกาศใหม่</h3>
            <div class="input-group">
                <label>ชื่อสินค้า/รายการหาร</label>
                <input type="text" id="pName" placeholder="เช่น หนังสือเรียน, หารค่าเน็ต">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>ราคารวม (บาท)</label>
                    <input type="number" id="pPrice" oninput="calcSplit()">
                </div>
                <div class="input-group">
                    <label>จำนวนคนหาร (1 ถ้าขายขาด)</label>
                    <input type="number" id="pSplit" value="1" oninput="calcSplit()">
                </div>
            </div>
            <div id="splitPreview" class="split-preview">ราคาต่อคน: ฿0</div>
            
            <div class="input-group">
                <label>คณะ/สาขา</label>
                <select id="pCategory">
                    <option value="ทั่วไป">ทั่วไป</option>
                    <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                    <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
                    <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
                    <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
                </select>
            </div>
            <textarea id="pDesc" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
            
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn-cancel">ยกเลิก</button>
                <button id="btnSubmitPost" class="btn-primary">ยืนยันโพสต์</button>
            </div>
        </div>
    </div>

    <div id="chatWindow" class="chat-float" style="display: none;">
        <div class="chat-header">
            <span id="chatTitle">ห้องแชท</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div id="chatMsgs" class="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="msgInp" placeholder="พิมพ์ข้อความ...">
            <button id="btnSend">ส่ง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
